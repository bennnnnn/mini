services:
  # ── Nginx reverse proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (FastAPI) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mini_cursor:changeme@postgres:5432/mini_cursor
      - DOCKER_EXECUTOR_IMAGE=mini-cursor-executor:latest
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker for executor
      - workspace_data:/tmp/mini-cursor-workspaces
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: mini_cursor
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: mini_cursor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_cursor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Docker Executor (sandbox) ──────────────────────────────────────
  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    image: mini-cursor-executor:latest
    # This is a base image, not a service — pulled by backend on-demand
    command: ["echo", "Executor image ready"]
    restart: "no"

volumes:
  pgdata:
  workspace_data:
